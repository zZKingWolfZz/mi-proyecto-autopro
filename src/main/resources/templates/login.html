<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url("../../static/img/banner.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            align-items: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <a class="text-decoration-none" th:href="@{/}">
                            <h2 class="text-center mb-4 fw-bold">Inicio de Sesión</h2>
                        </a>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="usuario" class="form-label text-secondary">Usuario o Correo</label>
                                <input type="text" class="form-control form-control-lg" id="usuario"
                                    placeholder="Ingresa tu usuario" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label text-secondary">Contraseña</label>
                                <input type="password" class="form-control form-control-lg" id="password"
                                    placeholder="••••••••" required>
                            </div>

                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">Recordar mi cuenta</label>
                            </div>

                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary btn-lg">Ingresar</button>
                            </div>
                            <div class="text-center">
                                <a href="#" class="text-decoration-none small">¿Olvidaste tu contraseña?</a>
                                <hr>
                                <p class="small">¿No tienes cuenta? <a href="#"
                                        class="text-decoration-none">Regístrate</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/script.js}"></script>
</body>

</html>
