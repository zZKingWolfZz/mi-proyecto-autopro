<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style_general.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Dashboard</title>
</head>

<body>

    <div class="container">
        <aside class="sidebar">
            <a th:href="@{/}" style="text-decoration: none;">
                <h2 class="logo">AutoPro</h2>
            </a>
            <div class="linea-logo"></div>

            <ul>
                <li>
                    <a th:href="@{/dashboard}">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                </li>

                <li>
                    <a th:href="@{/ventas}">
                        <i class="fas fa-shopping-cart"></i>
                        <span>Ventas</span>
                    </a>
                </li>

                <li>
                    <a th:href="@{/productos}">
                        <i class="fas fa-box"></i>
                        <span>Productos</span>
                    </a>
                </li>

                <li>
                    <a th:href="@{/clientes}">
                        <i class="fas fa-users"></i>
                        <span>Clientes</span>
                    </a>
                </li>

                <li>
                    <a th:href="@{/citas}">
                        <i class="fas fa-calendar-check"></i>
                        <span>Citas</span>
                    </a>
                </li>

                <li>
                    <a th:href="@{/reportes}">
                        <i class="fas fa-chart-line"></i>
                        <span>Reportes</span>
                    </a>
                </li>

                <li class="active">
                    <a th:href="@{/configuracion}">
                        <i class="fas fa-cog"></i>
                        <span>Configuración</span>
                    </a>
                </li>

            </ul>
            <footer class="footer">
                <span>© 2026 SistemaPro</span>
                <span>Desarrollado por Yeffer</span>
            </footer>
        </aside>

        <main class="main">
            <header class="topbar">
                <div style="display:flex;align-items:center;gap:12px">
                    <i class="fas fa-bars menu-btn"></i>
                    <div class="titulo">Configuracion</div>
                </div>

                <div class="top-icons">
                    <i class="fas fa-bell"></i>
                    <i class="fas fa-envelope"></i>

                    <div class="user-menu">
                        <img src="https://i.pravatar.cc/40" alt="Admin">
                        <span>Admin</span>
                        <i class="fas fa-chevron-down"></i>

                        <div class="user-dropdown">
                            <a href="#">Perfil</a>
                            <a href="#">Configuración</a>
                            <a href="#">Salir</a>
                        </div>
                    </div>
                </div>
            </header>

            <div class="settings-container">


                <!-- ================= CUENTA ================= -->
                <div class="settings-card">
                    <h3>Cuenta de Usuario</h3>

                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" placeholder="Tu nombre">
                    </div>

                    <div class="form-group">
                        <label>Correo electrónico</label>
                        <input type="email" placeholder="correo@ejemplo.com">
                    </div>

                    <div class="form-group">
                        <label>Cambiar contraseña</label>
                        <input type="password" placeholder="Nueva contraseña">
                    </div>

                    <button class="btn-primary">Guardar cambios</button>
                </div>

                <!-- ================= SISTEMA ================= -->
                <div class="settings-card">
                    <h3>Configuración del Sistema</h3>

                    <div class="form-group">
                        <label>Nombre del sistema</label>
                        <input type="text" value="Sistema-Pro">
                    </div>



                    <button class="btn-primary">Guardar sistema</button>
                </div>
                <!-- ================= NOTIFICACIONES ================= -->
                <div class="settings-card">
                    <h3>Notificaciones</h3>

                    <label class="switch">
                        <input type="checkbox" id="notif-activar" checked>
                        <span>Activar notificaciones</span>
                    </label>

                    <div class="form-group">
                        <label>Tipo de notificación</label>
                        <select id="notifpo-notif">
                            <option value="sistema">Sistema</option>
                            <option value="email">Email</option>
                            <option value="ambos">Sistema + Email</option>
                        </select>
                    </div>

                    <label class="switch">
                        <input type="checkbox" id="notif-sonido" checked>
                        <span>Sonido de alertas</span>
                    </label>

                    <button class="btn-primary" id="guardarNotif">Guardar notificaciones</button>
                </div>


                <!-- ================= APARIENCIA ================= -->
                <div class="settings-card">
                    <h3>Apariencia</h3>

                    <div class="form-group inline">
                        <label>
                            <input type="radio" name="tema" id="tema-claro" checked>
                            Modo Claro
                        </label>

                        <label>
                            <input type="radio" name="tema" id="tema-oscuro">
                            Modo Oscuro
                        </label>
                    </div>

                    <button class="btn-primary" id="aplicarTema">Aplicar</button>
                </div>


                <!-- ================= SEGURIDAD ================= -->
                <div class="settings-card">
                    <h3>Seguridad</h3>

                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                        Cerrar sesión en otros dispositivos
                    </label>

                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                        Forzar cambio de contraseña
                    </label>
                </div>
            </div>



</body>
<script th:src="@{/js/funcionsidebar.js}"></script>
<script th:src="@{/js/modo.js}"></script>

</html>



<style>
    .settings-container {
        padding: 30px;
        max-width: 960px;
    }

    /* Título principal */
    .settings-title {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 25px;
        color: #1f2937;
    }

    /* Tarjetas */
    .settings-card {
        background: #ffffff;
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 24px;
        box-shadow: 0 12px 25px rgba(0, 0, 0, .08);
        transition: transform .2s ease, box-shadow .2s ease;
    }

    .settings-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 35px rgba(0, 0, 0, .12);
    }

    .settings-card h3 {
        margin-bottom: 18px;
        font-size: 17px;
        font-weight: 600;
        color: #111827;
    }

    /* Formularios */
    .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 16px;
    }

    .form-group.inline {
        flex-direction: row;
        gap: 30px;
    }

    /* Labels */
    .form-group label {
        font-size: 14px;
        font-weight: 500;
        color: #374151;
        cursor: pointer;
    }

    /* Inputs */
    .form-group input,
    .form-group select {
        padding: 11px 12px;
        border-radius: 10px;
        border: 1px solid #e5e7eb;
        font-size: 14px;
        transition: border .2s ease, box-shadow .2s ease;
    }

    .form-group input:focus,
    .form-group select:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, .15);
    }

    /* Radios (apariencia más limpia) */
    .form-group.inline input[type="radio"] {
        accent-color: #2563eb;
        margin-right: 6px;
    }

    /* Botón */
    .btn-primary {
        margin-top: 15px;
        padding: 12px 22px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #2563eb, #1e40af);
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: transform .2s ease, box-shadow .2s ease;
    }

    .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(37, 99, 235, .4);
    }

    /* Switch (si lo usas) */
    .switch {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
        font-size: 14px;
        color: #374151;
    }

    /* ================= DARK MODE ================= */
    body.dark .settings-card {
        background: #020617;
        color: #e5e7eb;
        box-shadow: 0 15px 30px rgba(0, 0, 0, .6);
    }

    body.dark .settings-card h3 {
        color: #e5e7eb;
    }

    body.dark .form-group label {
        color: #cbd5f5;
    }

    body.dark .form-group input,
    body.dark .form-group select {
        background: #020617;
        border: 1px solid #1e293b;
        color: #e5e7eb;
    }
</style>
